name: Test

on:
  pull_request: {}
  push:
    branches: "*"
    tags: "*"

jobs:
  pmb_core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install pmb_core + pytest
        run: pip install ./pmb_core pytest
      - run: python -m pytest pmb_core/test

  mumble_bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mumble_bot
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies with pipenv
        run: |
          pip install pipenv
          pipenv install --skip-lock --dev
          pipenv run pip install ../pmb_core

      - run: pipenv run isort --recursive --diff .
      - run: pipenv run black --check .
      - run: pipenv run flake8
      - run: pipenv run pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies with pipenv
        run: |
          pip install pipenv
          pipenv install --skip-lock --dev
      - run: pipenv run pytest

  discord_bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: discord_bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install ffmpeg (for the song-render test)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies with pipenv
        run: |
          pip install pipenv
          pipenv install --skip-lock --dev
          pipenv run pip install ../pmb_core
      - run: pipenv run pytest
