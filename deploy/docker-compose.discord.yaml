name: pmb-discord

services:
  disc_mongo:
    image: mongo:7
    container_name: disc_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    volumes:
    - /tank/pmb/data/discord-mongo:/data/db
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  disc_bot:
    build:
      context: ..
      dockerfile: discord_bot/Dockerfile
    container_name: disc_bot
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: any
        delay: 10s
    depends_on:
      disc_mongo:
        condition: service_healthy
    environment:
      MONGODB_HOST: disc_mongo
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_ANNOUNCE_CHANNEL_ID: ${DISCORD_ANNOUNCE_CHANNEL_ID}
      CLIP_CAPTURE_ENABLED: "true"
    volumes:
    - /tank/pmb/discord-audio:/app/audio

  # Restarts disc_bot twice a day (02:00 and 14:00 Europe/London) to shed the
  # latency that creeps in the longer the voice stream stays warm. A throwaway
  # docker:cli container running busybox crond against the host Docker socket.
  disc_bot_restarter:
    image: docker:cli
    container_name: disc_bot_restarter
    restart: unless-stopped
    depends_on:
      - disc_bot
    environment:
      TZ: Europe/London
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache tzdata >/dev/null
        cp /usr/share/zoneinfo/$$TZ /etc/localtime
        mkdir -p /etc/crontabs
        echo '0 2,14 * * * docker restart disc_bot' > /etc/crontabs/root
        crond -f -l 8 -c /etc/crontabs

  disc_web:
    build: ../web
    container_name: disc_web
    restart: unless-stopped
    depends_on:
      disc_mongo:
        condition: service_healthy
    environment:
      MONGODB_HOST: disc_mongo
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      JWT_SECRET_KEY: ${DISCORD_JWT_SECRET_KEY}
      CLIP_ID_MODE: integer
      VOICE_CONTROL_ENABLED: "true"
      CLIP_CAPTURE_ENABLED: "true"
      APP_TITLE: "Discord Bot"
      NORMALIZE_UPLOADS: "true"
      PLAY_REQUIRES_PRESENCE: "true"
    volumes:
    - /tank/pmb/discord-audio:/app/audio
    ports:
      - "8002:8000"

  disc_tailscale:
    image: tailscale/tailscale:latest
    container_name: disc_tailscale
    hostname: pmb-discord
    restart: unless-stopped
    depends_on:
      - disc_web
    environment:
      TS_AUTHKEY: ${DISCORD_TAILSCALE_AUTHKEY}
      TS_EXTRA_ARGS: --advertise-tags=tag:container
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - /tank/pmb/data/discord-tailscale:/var/lib/tailscale
      - ./tailscale-serve.discord.json:/config/serve.json:ro
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
